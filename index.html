<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Check Portal | IGI Romania</title>
    <style>
        :root {
            --romania-blue: #002B7F;
            --romania-yellow: #FCD116;
            --romania-red: #CE1126;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #f4f7f9; display: flex; height: 100vh; }
        
        /* Information Entry Section */
        .entry-panel { width: 400px; background: #fff; padding: 25px; box-shadow: 2px 0 15px rgba(0,0,0,0.1); overflow-y: auto; }
        .entry-panel h2 { color: var(--romania-blue); font-size: 1.2rem; border-bottom: 2px solid var(--romania-yellow); padding-bottom: 10px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; color: #64748b; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; }
        
        /* Preview Section */
        .preview-panel { flex-grow: 1; padding: 40px; display: flex; justify-content: center; overflow-y: auto; }
        .doc-page { width: 210mm; background: #fff; padding: 20mm; box-shadow: 0 0 20px rgba(0,0,0,0.1); position: relative; }
        
        .qr-verified { 
            border: 2px solid #000; padding: 10px; text-align: center; font-size: 0.7rem; 
            width: 120px; background: #fff; position: absolute; bottom: 30mm; right: 20mm;
        }
        
        .btn-generate { 
            background: var(--romania-blue); color: #fff; border: none; width: 100%; 
            padding: 15px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="entry-panel">
        <h2>Job Check Entry</h2>
        <div class="input-group">
            <label>Reference Number</label>
            <input type="text" id="refIn" value="WP/ROM/FD/2026-0415">
        </div>
        <div class="input-group">
            <label>Issue Date</label>
            <input type="date" id="dateIn" value="2026-04-15">
        </div>
        <hr>
        <div class="input-group">
            <label>Company Name</label>
            <input type="text" id="compIn" placeholder="Enter Company">
        </div>
        <div class="input-group">
            <label>Client Full Name</label>
            <input type="text" id="clientIn" placeholder="Enter Client Name">
        </div>
        <div class="input-group">
            <label>Salary (RON)</label>
            <input type="number" id="salIn" value="3700">
        </div>
        
        <button class="btn-generate" onclick="updatePreview()">Update Official Preview</button>
    </div>

    <div class="preview-panel">
        <div class="doc-page">
            <div style="border-bottom: 2px solid var(--romania-blue); display: flex; justify-content: space-between;">
                <div style="font-weight: bold; color: var(--romania-blue); font-size: 0.8rem;">
                    MINISTERUL AFACERILOR INTERNE<br>Job Check Department
                </div>
                <div style="width: 50px; height: 30px; display: flex; border: 1px solid #ddd;">
                    <div style="background:var(--romania-blue); width:33%"></div>
                    <div style="background:var(--romania-yellow); width:33%"></div>
                    <div style="background:var(--romania-red); width:34%"></div>
                </div>
            </div>
            
            <h3 style="text-align: center; color: var(--romania-blue);">OFFER AGREEMENT</h3>
            <p style="text-align: right; font-size: 0.8rem;">Ref: <span id="refOut">...</span> | Date: <span id="dateOut">...</span></p>
            
            <p><strong>Employer:</strong> <span id="compOut">...</span></p>
            <p><strong>Candidate:</strong> <span id="clientOut">...</span></p>
            <p><strong>Salary:</strong> <span id="salOut">...</span> RON</p>
            
            <div class="qr-verified">
                <strong>QR VERIFIED</strong><hr>
                CLIENT: <span id="qrClient">...</span><br>
                COMPANY: <span id="qrComp">...</span><br>
                STATUS: IGI APPROVED
            </div>
        </div>
    </div>

    <script>
        function updatePreview() {
            document.getElementById('refOut').innerText = document.getElementById('refIn').value;
            document.getElementById('dateOut').innerText = document.getElementById('dateIn').value;
            document.getElementById('compOut').innerText = document.getElementById('compIn').value;
            document.getElementById('clientOut').innerText = document.getElementById('clientIn').value;
            document.getElementById('salOut').innerText = document.getElementById('salIn').value;
            
            // Auto-generate verification data for QR section
            document.getElementById('qrClient').innerText = document.getElementById('clientIn').value;
            document.getElementById('qrComp').innerText = document.getElementById('compIn').value;
        }
    </script>
</body>
</html>
