<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Airways Boarding Pass - Syed Munawar Shah</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+128&family=Roboto+Mono:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --thai-purple: #5c2d91;
            --border-color: #d1d1d1;
        }
        body {
            background-color: #f0f0f0;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .ticket {
            background: white;
            width: 850px;
            height: 320px;
            display: flex;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .main {
            flex: 2.5;
            padding: 25px;
            border-right: 2px dashed #bbb;
            position: relative;
        }
        .stub {
            flex: 1;
            padding: 25px;
            background-color: #fafafa;
        }
        /* Headers */
        .top-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .logo-area { color: var(--thai-purple); font-weight: bold; font-size: 24px; }
        .economy-label { font-size: 14px; color: #444; letter-spacing: 1px; margin-top: 5px;}
        .class-y { font-size: 50px; font-weight: bold; line-height: 1; color: #333; }

        /* Passenger Info */
        .label { font-size: 10px; color: #777; text-transform: uppercase; margin-bottom: 2px; }
        .name { font-size: 18px; font-weight: bold; margin-bottom: 20px; }

        /* Flight Grid */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }
        .big-text { font-size: 28px; font-weight: bold; margin-bottom: 5px; }
        .medium-text { font-size: 16px; font-weight: bold; }

        /* Highlight Boxes */
        .highlight-container {
            display: flex;
            margin-top: 25px;
            gap: 15px;
        }
        .box {
            border: 1.5px solid #000;
            padding: 8px 15px;
            text-align: center;
            min-width: 80px;
        }
        .box .val { font-size: 22px; font-weight: bold; }

        /* Barcode Placeholder */
        .barcode {
            position: absolute;
            left: -45px;
            top: 110px;
            transform: rotate(90deg);
            width: 160px;
            height: 45px;
            background: repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 5px);
        }

        .footer {
            margin-top: 35px;
            font-family: 'Roboto Mono', monospace;
            font-size: 11px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="ticket">
    <div class="main">
        <div class="barcode"></div>
        
        <div class="top-row">
            <div>
                <div class="logo-area">THAI</div>
                <div class="economy-label">ECONOMY</div>
            </div>
            <div class="class-y">Y</div>
            <div class="box" style="border-radius: 5px;">
                <div class="label">Boarding Group</div>
                <div class="val">3</div>
            </div>
        </div>

        <div class="name">
            <div class="label">Passenger Name</div>
            SHAH / SYED MUNAWAR
        </div>

        <div class="details-grid">
            <div>
                <div class="label">Flight</div>
                <div class="big-text">TG 346</div>
                <div class="label">22 NOV</div>
            </div>
            <div>
                <div class="label">From</div>
                <div class="medium-text">LAHORE / LHE</div>
                <div class="label" style="margin-top:10px;">To</div>
                <div class="medium-text">BANGKOK / BKK</div>
            </div>
        </div>

        <div class="highlight-container">
            <div class="box">
                <div class="label">Gate</div>
                <div class="val">22</div>
            </div>
            <div class="box">
                <div class="label">Boarding Time</div>
                <div class="val">23:05</div>
            </div>
            <div class="box">
                <div class="label">Seat</div>
                <div class="val">48B</div>
            </div>
        </div>

        <div class="footer">
            SEQ 0111 &nbsp; ETKT 217551823215901 &nbsp; API
        </div>
    </div>

    <div class="stub">
        <div class="label">Economy</div>
        <div class="name" style="font-size: 14px;">SHAH / SYED MUNAWAR</div>
        <div class="big-text" style="font-size: 22px;">TG 346</div>
        <div class="label">22 NOV</div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
        <div class="label">From: LHE</div>
        <div class="label">To: BKK</div>
        <div class="label" style="margin-top:15px;">Seat</div>
        <div class="val" style="font-size: 24px; font-weight: bold;">48B</div>
    </div>
</div>

</body>
</html>
