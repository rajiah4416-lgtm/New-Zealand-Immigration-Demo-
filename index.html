<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immigration Portal | Work Permit Romania</title>
    <style>
        :root {
            --romania-blue: #002B7F;
            --romania-yellow: #FCD116;
            --romania-red: #CE1126;
            --bg-light: #f8fafc;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg-light); color: #1e293b; }
        nav { background: var(--romania-blue); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; color: white; }
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header-banner { border-left: 10px solid var(--romania-yellow); padding-left: 20px; margin-bottom: 30px; }
        .status-badge { background: #e2e8f0; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; color: var(--romania-blue); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .btn-submit { background: var(--romania-blue); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .btn-submit:hover { background: #001f5c; }
        .qr-section { text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }
        .flag-strip { height: 5px; display: flex; }
        .f-blue { background: var(--romania-blue); width: 33.3%; }
        .f-yellow { background: var(--romania-yellow); width: 33.3%; }
        .f-red { background: var(--romania-red); width: 33.4%; }
    </style>
</head>
<body>
    <div class="flag-strip"><div class="f-blue"></div><div class="f-yellow"></div><div class="f-red"></div></div>
    <nav>
        <div style="font-weight: bold; letter-spacing: 1px;">IGI COMPLIANCE PORTAL</div>
        <div>Work Permit Dept.</div>
    </nav>

    <div class="container">
        <div class="header-banner">
            <span class="status-badge">DOCUMENT GENERATOR 2026</span>
            <h1>Offer Agreement Data Entry</h1>
            <p>Enter the details for the Food Delivery Work Permit application.</p>
        </div>

        <form>
            <div class="grid">
                <div class="input-group">
                    <label>Company Name (Angajator)</label>
                    <input type="text" placeholder="e.g. LogiFood Romania SRL">
                </div>
                <div class="input-group">
                    <label>Registry No (CUI/J)</label>
                    <input type="text" placeholder="J40/1234/2026">
                </div>
                <div class="input-group">
                    <label>Client Full Name</label>
                    <input type="text" placeholder="As per Passport">
                </div>
                <div class="input-group">
                    <label>Passport Number</label>
                    <input type="text" placeholder="Enter number">
                </div>
                <div class="input-group">
                    <label>Issue Date</label>
                    <input type="date">
                </div>
                <div class="input-group">
                    <label>Reference Number</label>
                    <input type="text" placeholder="REF-FD-2026-XXXX">
                </div>
            </div>

            <button type="button" class="btn-submit">GENERATE OFFICIAL OFFER LETTER</button>
        </form>

        <div class="qr-section">
            <p style="font-size: 0.8rem; color: #64748b;">Verification QR will be auto-generated upon submission.</p>
            <div style="background: #f1f5f9; height: 100px; width: 100px; margin: 0 auto; display: flex; align-items: center; justify-content: center; border: 2px dashed #cbd5e1;">
                <span style="font-size: 0.7rem;">QR PREVIEW</span>
            </div>
        </div>
    </div>
</body>
</html>
