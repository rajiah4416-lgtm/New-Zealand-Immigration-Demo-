<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Boarding Pass</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --thai-purple: #5c2d91;
            --ticket-bg: #fdfdfd;
        }
        body {
            background-color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }
        .boarding-pass {
            display: flex;
            width: 800px;
            height: 280px;
            background: var(--ticket-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 1px solid #ccc;
        }
        /* Left Section */
        .main-section {
            flex: 3;
            padding: 20px;
            border-right: 2px dashed #ccc;
            position: relative;
        }
        /* Right Section (Stub) */
        .stub-section {
            flex: 1;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .logo {
            font-weight: bold;
            font-size: 24px;
            color: var(--thai-purple);
        }
        .class-label { font-size: 14px; font-weight: bold; }
        
        .passenger-name { font-size: 18px; margin-bottom: 15px; text-transform: uppercase; }
        
        .flight-info {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 10px;
        }
        .label { font-size: 10px; color: #777; text-transform: uppercase; }
        .value { font-size: 18px; font-weight: bold; }
        .flight-no { font-size: 32px; color: #000; }

        .barcode-area {
            transform: rotate(90deg);
            position: absolute;
            left: -40px;
            top: 100px;
            width: 150px;
            height: 40px;
            background: repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 4px);
        }

        .footer-info {
            margin-top: 30px;
            font-family: 'Roboto Mono', monospace;
            font-size: 11px;
        }
    </style>
</head>
<body>

<div class="boarding-pass">
    <div class="main-section">
        <div class="barcode-area"></div>
        
        <div class="header">
            <div class="logo">THAI</div>
            <div class="class-label">ECONOMY</div>
            <div style="font-size: 40px; font-weight: bold;">Y</div>
        </div>

        <div class="passenger-name">
            <div class="label">Name</div>
            <strong>LAINE / VERNE</strong>
        </div>

        <div class="flight-info">
            <div>
                <div class="label">Flight</div>
                <div class="flight-no">TG 961</div>
            </div>
            <div>
                <div class="label">From / To</div>
                <div class="value">STOCKHOLM (ARN)</div>
                <div class="value">BANGKOK (BKK)</div>
            </div>
            <div>
                <div class="label">Date</div>
                <div class="value">10 MAR</div>
            </div>
        </div>

        <div style="display: flex; margin-top: 20px; border: 1px solid #ddd; padding: 10px; border-radius: 8px;">
            <div style="margin-right: 40px;">
                <div class="label">Gate</div>
                <div class="value" style="font-size: 24px;">D18</div>
            </div>
            <div style="margin-right: 40px;">
                <div class="label">Boarding Time</div>
                <div class="value" style="font-size: 24px;">12:00</div>
            </div>
            <div>
                <div class="label">Seat</div>
                <div class="value" style="font-size: 24px;">51C</div>
            </div>
        </div>

        <div class="footer-info">
            ETKT 217234757011602 | SEQ 0001
        </div>
    </div>

    <div class="stub-section">
        <div class="label">Economy</div>
        <div class="passenger-name" style="font-size: 14px;">LAINE / VERNE</div>
        <div class="flight-no" style="font-size: 24px;">TG 961</div>
        <div class="label">10 MAR</div>
        <br>
        <div class="label">From: ARN</div>
        <div class="label">To: BKK</div>
        <div class="label">Seat</div>
        <div class="value">51C</div>
    </div>
</div>

</body>
</html>
